# Server Configuration
server.port=8080

# Database Configuration (H2 In-Memory with MySQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:lifelinkdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA and Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization (Load schema.sql and data.sql)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# JWT Configuration (256-bit secret key)
lifelink.jwt.secret=9a67a86c6a4d6b6376517a65346859556a347372776c54784a65675836413247596b6d51383765
lifelink.jwt.expiration=86400000

# Gemini API Configuration
google.gemini.api-key=${GEMINI_API_KEY:}
google.gemini.model=gemini-1.5-flash

# Logging levels
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.lifelink=DEBUG
